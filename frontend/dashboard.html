<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Kirana Store Demand Predictor</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0a0a0a;
            min-height: 100vh;
            padding: 20px;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background:
                linear-gradient(rgba(255, 100, 0, 0.04) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 100, 0, 0.04) 1px, transparent 1px);
            background-size: 40px 40px;
            pointer-events: none;
            z-index: 0;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            animation: fadeInDown 0.5s ease-out;
            position: relative;
            z-index: 1;
        }

        .header-title {
            color: #ff6400;
            font-size: 24px;
            font-weight: 700;
            text-shadow: 0 0 15px rgba(255, 100, 0, 0.5);
        }

        .logout-btn {
            background: transparent;
            color: #ff6400;
            border: 2px solid #ff6400;
            padding: 10px 25px;
            border-radius: 25px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
            box-shadow: 0 0 10px rgba(255, 100, 0, 0.2);
        }

        .logout-btn:hover {
            background: #ff6400;
            color: #000;
            box-shadow: 0 0 20px rgba(255, 100, 0, 0.6);
        }

        .container {
            background: #111;
            border: 1px solid rgba(255, 100, 0, 0.25);
            border-radius: 20px;
            box-shadow: 0 0 40px rgba(255, 100, 0, 0.15), 0 0 80px rgba(255, 60, 0, 0.08);
            max-width: 600px;
            width: 100%;
            padding: 40px;
            margin: 0 auto;
            animation: fadeInUp 0.5s ease-out;
            position: relative;
            z-index: 1;
        }

        h1 {
            color: #ff6400;
            margin-bottom: 10px;
            font-size: 28px;
            text-shadow: 0 0 15px rgba(255, 100, 0, 0.4);
        }

        .subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #ff8c42;
            font-weight: 600;
            font-size: 14px;
            letter-spacing: 0.5px;
        }

        select,
        input {
            width: 100%;
            padding: 12px 15px;
            background: #1a1a1a;
            border: 2px solid #2a2a2a;
            border-radius: 10px;
            font-size: 14px;
            color: #fff;
            transition: border-color 0.3s, box-shadow 0.3s;
        }

        select option {
            background: #1a1a1a;
        }

        select:focus,
        input:focus {
            outline: none;
            border-color: #ff6400;
            box-shadow: 0 0 12px rgba(255, 100, 0, 0.3);
        }

        button[type="submit"] {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #ff6400 0%, #ff3c00 100%);
            color: #000;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            margin-top: 10px;
            letter-spacing: 0.5px;
            box-shadow: 0 0 20px rgba(255, 100, 0, 0.4);
        }

        button[type="submit"]:hover {
            transform: translateY(-2px);
            box-shadow: 0 0 35px rgba(255, 100, 0, 0.7);
        }

        button[type="submit"]:active {
            transform: translateY(0);
        }

        .result {
            margin-top: 30px;
            padding: 25px;
            background: #0d0d0d;
            border: 1px solid rgba(255, 100, 0, 0.2);
            border-radius: 10px;
            display: none;
            animation: fadeInUp 0.5s ease-out;
        }

        .result h3 {
            color: #ff6400;
            margin-bottom: 15px;
            font-size: 20px;
            text-shadow: 0 0 10px rgba(255, 100, 0, 0.4);
        }

        .result-item {
            margin-bottom: 15px;
            padding: 15px;
            background: #1a1a1a;
            border-radius: 8px;
            border-left: 4px solid #ff6400;
            box-shadow: inset 0 0 10px rgba(255, 100, 0, 0.05);
        }

        .result-label {
            font-weight: 600;
            color: #888;
            font-size: 13px;
            margin-bottom: 5px;
            letter-spacing: 1px;
        }

        .result-value {
            font-size: 24px;
            color: #ff6400;
            font-weight: 700;
            text-shadow: 0 0 10px rgba(255, 100, 0, 0.5);
        }

        .explanation {
            margin-top: 15px;
            padding: 15px;
            background: #1a1a1a;
            border-radius: 8px;
            line-height: 1.6;
            color: #aaa;
            font-size: 14px;
            border-left: 4px solid #ff8c42;
        }

        .loading {
            display: none;
            text-align: center;
            margin-top: 20px;
            color: #ff8c42;
        }

        .spinner {
            border: 3px solid #222;
            border-top: 3px solid #ff6400;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 10px;
            box-shadow: 0 0 15px rgba(255, 100, 0, 0.4);
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>

<body>
    <div class="header">
        <div class="header-title">🏪 Kirana Supply Chain Optimizer</div>
        <button class="logout-btn" onclick="logout()">Logout</button>
    </div>

    <div class="container">
        <h1>Demand Predictor</h1>
        <p class="subtitle">AI-powered demand forecasting and inventory optimization</p>

        <form id="predictionForm">
            <div class="form-group">
                <label for="product">Product</label>
                <select id="product" required>
                    <option value="">Select a product</option>
                    <option value="milk">Milk</option>
                    <option value="bread">Bread</option>
                    <option value="rice">Rice</option>
                    <option value="eggs">Eggs</option>
                    <option value="flour">Flour</option>
                    <option value="sugar">Sugar</option>
                    <option value="tea">Tea</option>
                    <option value="biscuits">Biscuits</option>
                    <option value="oil">Oil</option>
                    <option value="salt">Salt</option>
                </select>
            </div>

            <div class="form-group">
                <label for="day_type">Day Type</label>
                <select id="day_type" required>
                    <option value="">Select day type</option>
                    <option value="weekday">Weekday</option>
                    <option value="weekend">Weekend</option>
                </select>
            </div>

            <div class="form-group">
                <label for="time_slot">Time Slot</label>
                <select id="time_slot" required>
                    <option value="">Select time slot</option>
                    <option value="morning">Morning (6 AM - 12 PM)</option>
                    <option value="afternoon">Afternoon (12 PM - 5 PM)</option>
                    <option value="evening">Evening (5 PM - 10 PM)</option>
                </select>
            </div>

            <div class="form-group">
                <label for="inventory">Current Inventory (units)</label>
                <input type="number" id="inventory" min="0" placeholder="Enter current inventory" required>
            </div>

            <button type="submit">Get Prediction</button>
        </form>

        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p>Analyzing demand patterns...</p>
        </div>

        <div class="result" id="result">
            <h3>Prediction Results</h3>

            <div class="result-item">
                <div class="result-label">PREDICTED DEMAND</div>
                <div class="result-value" id="demand">-</div>
            </div>

            <div class="result-item">
                <div class="result-label">RESTOCK RECOMMENDATION</div>
                <div class="result-value" id="restock">-</div>
            </div>

            <div class="explanation">
                <strong>💡 Explanation:</strong>
                <p id="explanation">-</p>
            </div>
        </div>
    </div>

    <script>
        // Check if logged in
        if (localStorage.getItem('isLoggedIn') !== 'true') {
            window.location.href = 'login.html';
        }

        function logout() {
            localStorage.removeItem('isLoggedIn');
            window.location.href = 'login.html';
        }

        const form = document.getElementById('predictionForm');
        const resultDiv = document.getElementById('result');
        const loadingDiv = document.getElementById('loading');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            // Show loading, hide result
            loadingDiv.style.display = 'block';
            resultDiv.style.display = 'none';

            // Get form data
            const data = {
                product: document.getElementById('product').value,
                day_type: document.getElementById('day_type').value,
                time_slot: document.getElementById('time_slot').value,
                inventory: parseInt(document.getElementById('inventory').value)
            };

            try {
                // Call API
                const response = await fetch('http://localhost:8000/predict', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(data)
                });

                const result = await response.json();

                // Display results
                document.getElementById('demand').textContent = result.predicted_demand.toFixed(1) + ' units';
                document.getElementById('restock').textContent = result.restock + ' units';
                document.getElementById('explanation').textContent = result.explanation;

                // Show result, hide loading
                loadingDiv.style.display = 'none';
                resultDiv.style.display = 'block';

            } catch (error) {
                alert('Error: Could not connect to API. Make sure the FastAPI server is running on port 8000.');
                loadingDiv.style.display = 'none';
            }
        });
    </script>
</body>

</html>
