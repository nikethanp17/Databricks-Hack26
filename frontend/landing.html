<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome — Kirana Supply Optimizer</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        body {
            overflow: hidden;
        }

        /* Animated gradient overlay */
        .hero-bg {
            position: fixed;
            inset: 0;
            background: linear-gradient(270deg,
                    rgba(255, 60, 0, 0.08),
                    rgba(255, 100, 0, 0.04),
                    rgba(0, 0, 0, 0),
                    rgba(255, 80, 0, 0.06));
            background-size: 400% 400%;
            animation: gradientShift 10s ease infinite;
            z-index: 0;
        }

        .hero {
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
            padding: 32px;
        }

        .hero-icons {
            font-size: 4.5rem;
            margin-bottom: 36px;
            opacity: 0;
            animation: fadeInUp 0.8s ease-out 0.2s forwards;
            filter: drop-shadow(0 0 18px #ff6400);
        }

        .hero-icons span {
            display: inline-block;
            margin: 0 14px;
        }

        .hero-icons span:nth-child(1) {
            animation: floatY 3.2s ease-in-out infinite;
        }

        .hero-icons span:nth-child(2) {
            animation: floatY 3.2s ease-in-out 0.6s infinite;
        }

        .hero-icons span:nth-child(3) {
            animation: floatY 3.2s ease-in-out 1.2s infinite;
        }

        .hero h1 {
            font-size: clamp(1.8rem, 5vw, 3rem);
            margin-bottom: 16px;
            opacity: 0;
            animation: fadeInUp 0.8s ease-out 0.5s forwards;
            max-width: 700px;
        }

        .typewriter-wrap {
            font-size: 1.15rem;
            color: var(--neon-dim);
            height: 28px;
            margin-bottom: 12px;
            opacity: 0;
            animation: fadeIn 0.6s ease-out 1s forwards;
        }

        #typewriterText::after {
            content: '|';
            animation: blink 0.8s step-end infinite;
            color: var(--neon);
        }

        @keyframes blink {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0;
            }
        }

        .hero-sub {
            font-size: 1.05rem;
            color: var(--text-muted);
            margin-bottom: 52px;
            opacity: 0;
            animation: fadeInUp 0.8s ease-out 1.5s forwards;
            font-weight: 300;
        }

        .features {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            justify-content: center;
            margin-bottom: 52px;
            opacity: 0;
            animation: fadeInUp 0.8s ease-out 1.9s forwards;
        }

        .feature-chip {
            background: rgba(255, 100, 0, 0.08);
            border: 1px solid var(--border);
            border-radius: 50px;
            padding: 10px 22px;
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--neon-dim);
            display: flex;
            align-items: center;
            gap: 8px;
            transition: box-shadow 0.3s, transform 0.3s;
        }

        .feature-chip:hover {
            box-shadow: 0 0 16px rgba(255, 100, 0, 0.3);
            transform: translateY(-3px);
        }

        .cta-wrap {
            opacity: 0;
            animation: fadeInUp 0.8s ease-out 2.3s forwards;
        }

        .badge {
            display: inline-block;
            background: rgba(255, 100, 0, 0.12);
            border: 1px solid var(--border);
            border-radius: 4px;
            padding: 3px 10px;
            font-size: 0.75rem;
            font-weight: 600;
            color: var(--neon-dim);
            letter-spacing: 0.5px;
            margin-bottom: 18px;
        }
    </style>
</head>

<body data-page="landing">
    <div class="grid-bg"></div>
    <div class="radial-glow"></div>
    <div class="hero-bg"></div>

    <section class="hero" id="hero">
        <div class="hero-icons">
            <span>🏪</span><span>📊</span><span>🤖</span>
        </div>

        <span class="badge">✨ Databricks Hackathon 2026</span>

        <h1 class="neon-text">Hyper-Local Supply Chain Optimizer</h1>

        <div class="typewriter-wrap">
            <span id="typewriterText"></span>
        </div>

        <p class="hero-sub">Transform your Kirana store with intelligent AI predictions</p>

        <div class="features">
            <div class="feature-chip">📈 Demand Forecasting</div>
            <div class="feature-chip">💡 Smart Restocking</div>
            <div class="feature-chip">⚡ Real-time Analytics</div>
            <div class="feature-chip">🧠 Explainable AI</div>
        </div>

        <div class="cta-wrap">
            <button class="btn btn-primary btn-pill" id="enterDashboard">
                Enter Dashboard &nbsp;→
            </button>
        </div>
    </section>

    <script src="script.js"></script>
</body>

</html>
