<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — Kirana Supply Optimizer</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        .logo-icon {
            font-size: 3.5rem;
            display: block;
            text-align: center;
            margin-bottom: 16px;
            filter: drop-shadow(0 0 16px #ff6400);
            animation: floatY 3s ease-in-out infinite;
        }

        .login-header {
            text-align: center;
            margin-bottom: 32px;
        }

        .login-header h1 {
            font-size: 1.6rem;
            margin-bottom: 6px;
        }

        .password-toggle {
            position: relative;
        }

        .password-toggle input {
            padding-right: 44px;
        }

        .toggle-btn {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            cursor: pointer;
            color: var(--text-muted);
            font-size: 1.1rem;
            padding: 4px;
            line-height: 1;
            transition: color 0.2s;
        }

        .toggle-btn:hover {
            color: var(--neon);
        }
    </style>
</head>

<body data-page="login">
    <div class="grid-bg"></div>
    <div class="radial-glow"></div>

    <div class="page-center">
        <div class="container-sm anim-fade-in-up">
            <div class="card">
                <span class="logo-icon">🏪</span>

                <div class="login-header">
                    <h1 class="neon-text">Kirana Supply Optimizer</h1>
                    <p class="muted">AI-Powered Demand Prediction</p>
                </div>

                <div class="alert alert-error" id="alertError" role="alert"></div>

                <form id="loginForm" novalidate>
                    <div class="form-group">
                        <label for="username">Username</label>
                        <input type="text" id="username" placeholder="Enter username" autocomplete="username" required
                            spellcheck="false">
                        <p class="field-error" id="usernameErr"></p>
                    </div>

                    <div class="form-group">
                        <label for="password">Password</label>
                        <div class="password-toggle">
                            <input type="password" id="password" placeholder="Enter password"
                                autocomplete="current-password" required>
                            <button type="button" class="toggle-btn" id="togglePwd"
                                aria-label="Toggle password visibility">👁</button>
                        </div>
                        <p class="field-error" id="passwordErr"></p>
                    </div>

                    <button type="submit" class="btn btn-primary" style="margin-top:8px">
                        Login →
                    </button>
                </form>

                <div class="hint-box">
                    <strong>Demo credentials —</strong> Username: <strong>admin</strong> &nbsp;|&nbsp; Password:
                    <strong>1234</strong>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
    <script>
        // Password show/hide toggle
        document.getElementById('togglePwd')?.addEventListener('click', function () {
            const pwd = document.getElementById('password');
            const isText = pwd.type === 'text';
            pwd.type = isText ? 'password' : 'text';
            this.textContent = isText ? '👁' : '🙈';
        });
    </script>
</body>

</html>
