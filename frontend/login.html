<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Kirana Supply Optimizer</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0a0a0a;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            overflow: hidden;
        }

        /* Animated neon grid background */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background:
                linear-gradient(rgba(255,100,0,0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,100,0,0.05) 1px, transparent 1px);
            background-size: 40px 40px;
            pointer-events: none;
            z-index: 0;
        }

        .login-container {
            background: #111;
            border: 1px solid rgba(255,100,0,0.3);
            border-radius: 20px;
            box-shadow: 0 0 40px rgba(255,100,0,0.2), 0 0 80px rgba(255,60,0,0.1);
            max-width: 400px;
            width: 100%;
            padding: 50px 40px;
            text-align: center;
            animation: fadeIn 0.5s ease-in;
            position: relative;
            z-index: 1;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .logo {
            font-size: 60px;
            margin-bottom: 20px;
            filter: drop-shadow(0 0 12px #ff6400);
        }

        h1 {
            color: #ff6400;
            margin-bottom: 10px;
            font-size: 24px;
            text-shadow: 0 0 15px rgba(255,100,0,0.6);
        }

        .subtitle {
            color: #888;
            margin-bottom: 40px;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #ff8c42;
            font-weight: 600;
            font-size: 14px;
            letter-spacing: 0.5px;
        }

        input {
            width: 100%;
            padding: 12px 15px;
            background: #1a1a1a;
            border: 2px solid #2a2a2a;
            border-radius: 10px;
            font-size: 14px;
            color: #fff;
            transition: border-color 0.3s, box-shadow 0.3s;
        }

        input::placeholder { color: #555; }

        input:focus {
            outline: none;
            border-color: #ff6400;
            box-shadow: 0 0 12px rgba(255,100,0,0.3);
        }

        button {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #ff6400 0%, #ff3c00 100%);
            color: #000;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            margin-top: 10px;
            letter-spacing: 0.5px;
            box-shadow: 0 0 20px rgba(255,100,0,0.4);
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 0 30px rgba(255,100,0,0.7);
        }

        button:active { transform: translateY(0); }

        .error {
            background: rgba(200,30,30,0.15);
            border: 1px solid rgba(255,60,60,0.4);
            color: #ff6b6b;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
            font-size: 14px;
        }

        .demo-credentials {
            background: rgba(255,100,0,0.08);
            border: 1px solid rgba(255,100,0,0.2);
            padding: 15px;
            border-radius: 8px;
            margin-top: 20px;
            font-size: 13px;
            color: #888;
        }

        .demo-credentials strong { color: #ff6400; }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo">🏪</div>
        <h1>Kirana Supply Optimizer</h1>
        <p class="subtitle">AI-Powered Demand Prediction</p>
        
        <div class="error" id="errorMessage">Invalid credentials</div>
        
        <form id="loginForm">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" placeholder="Enter username" required autocomplete="username">
            </div>
            
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="Enter password" required autocomplete="current-password">
            </div>
            
            <button type="submit">Login</button>
        </form>
        
        <div class="demo-credentials">
            <strong>Demo Credentials:</strong><br>
            Username: admin<br>
            Password: 1234
        </div>
    </div>
    
    <script>
        // Check if already logged in
        if (localStorage.getItem('isLoggedIn') === 'true') {
            window.location.href = 'landing.html';
        }
        
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const errorMessage = document.getElementById('errorMessage');
            
            // Hardcoded credentials
            if (username === 'admin' && password === '1234') {
                // Set login session
                localStorage.setItem('isLoggedIn', 'true');
                
                // Redirect to landing page
                window.location.href = 'landing.html';
            } else {
                // Show error
                errorMessage.style.display = 'block';
                errorMessage.style.animation = 'shake 0.5s';
                
                setTimeout(() => {
                    errorMessage.style.animation = '';
                }, 500);
            }
        });
    </script>
</body>
</html>
